<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1280" height="720" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
  <g id="chapter-card">
    <rect x="54" y="142" width="1172" height="520" rx="8" ry="8" fill="#FFFFFF" stroke="#0D5DBE" stroke-width="1.6" stroke-opacity="0.18"/>
    <rect x="54" y="656" width="1172" height="11" rx="5.5" ry="5.5" fill="#0D5DBE"/>
    <rect x="346" y="312" width="64" height="64" fill="#072F5F"/>
    <rect x="380" y="344" width="96" height="96" fill="#0D5DBE"/>
  </g>
  <g id="chapter-logo" data-slot="LOGO_IMAGE" data-slot-type="image">
    <rect x="986" y="28" width="214" height="56" rx="4" ry="4" fill="#FFFFFF" stroke="#0D5DBE" stroke-width="1.5" stroke-opacity="0.25"/>
    <image href="{{LOGO_IMAGE}}" x="996" y="36" width="194" height="40" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g id="chapter-heading">
    <text x="64" y="58" text-anchor="start" xml:space="preserve" font-family="Microsoft YaHei, Arial, sans-serif" font-size="44" fill="#0E2841" font-weight="bold"><tspan>章节</tspan><tspan fill="#A6A6A6" font-size="34"> SECTION</tspan></text>
  </g>
  <g id="chapter-number" data-slot="CHAPTER_NUM">
    <rect x="358" y="350" width="118" height="84" fill="none"/>
    <text x="430" y="402" text-anchor="middle" xml:space="preserve" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" fill="#FFFFFF" font-weight="bold" data-pptx-textbox="true"><tspan>{{CHAPTER_NUM}}</tspan></text>
  </g>
  <g id="chapter-title" data-slot="CHAPTER_TITLE">
    <rect x="512" y="312" width="500" height="92" fill="none"/>
    <text x="522" y="374" text-anchor="start" xml:space="preserve" font-family="Microsoft YaHei, Arial, sans-serif" font-size="60" fill="#0E2841" font-weight="bold" data-pptx-textbox="true"><tspan>{{CHAPTER_TITLE}}</tspan></text>
  </g>
  <g id="chapter-desc" data-slot="CHAPTER_DESC">
    <rect x="512" y="420" width="540" height="46" fill="none"/>
    <text x="522" y="450" text-anchor="start" xml:space="preserve" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#4B5563" data-pptx-textbox="true"><tspan>{{CHAPTER_DESC}}</tspan></text>
  </g>
</svg>
