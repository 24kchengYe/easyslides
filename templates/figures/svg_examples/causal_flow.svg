<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="cg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8A8A8A"/>
    </marker>
    <marker id="cr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#C44E52"/>
    </marker>
  </defs>

  <!-- step 1: probe gives a direction -->
  <rect x="64" y="250" width="236" height="150" rx="13" fill="#EAF3F8" stroke="#BFD7E6" stroke-width="1.5"/>
  <text x="182" y="288" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#0072B2">1 . A direction</text>
  <text x="182" y="320" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#1A1A1A">probing gives the</text>
  <text x="182" y="342" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#1A1A1A">"population" direction</text>
  <text x="182" y="376" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#0072B2">w_pop</text>

  <line x1="300" y1="325" x2="384" y2="325" stroke="#8A8A8A" stroke-width="2.5" marker-end="url(#cg)"/>

  <!-- step 2: edit the hidden state -->
  <rect x="384" y="250" width="262" height="150" rx="13" fill="#FBEAE8" stroke="#E8B5B2" stroke-width="1.5"/>
  <text x="515" y="288" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#C44E52">2 . Nudge it</text>
  <text x="515" y="318" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#1A1A1A">add a small push to the</text>
  <text x="515" y="340" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#1A1A1A">internal state at a layer</text>
  <text x="515" y="376" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#C44E52">h' = h + &#948; &#183; w_pop</text>

  <line x1="646" y1="325" x2="730" y2="325" stroke="#8A8A8A" stroke-width="2.5" marker-end="url(#cg)"/>

  <!-- step 3: re-run and read output change -->
  <rect x="730" y="250" width="262" height="150" rx="13" fill="#eef1f4" stroke="#bcc6cf" stroke-width="1.5"/>
  <text x="861" y="288" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#1A1A1A">3 . Re-run</text>
  <text x="861" y="318" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#1A1A1A">did the model's output</text>
  <text x="861" y="340" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#1A1A1A">actually move?</text>
  <text x="861" y="376" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-style="italic" fill="#666666">if yes, the layer is causal</text>

  <line x1="992" y1="325" x2="1076" y2="325" stroke="#C44E52" stroke-width="2.5" marker-end="url(#cr)"/>

  <!-- verdict -->
  <rect x="1076" y="288" width="148" height="74" rx="13" fill="#C44E52"/>
  <text x="1150" y="318" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">a true</text>
  <text x="1150" y="338" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">cause-test</text>

  <!-- layer-sweep strip -->
  <text x="64" y="470" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">Sweep every layer to find where the nudge bites</text>
  <text x="64" y="494" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#666666">probing alone only shows a fact is stored; only this edit-and-rerun test shows the fact is used</text>

  <!-- mini layer bars -->
  <rect x="64" y="516" width="1018" height="86" rx="10" fill="#F4F6F8" stroke="#E0E4E8" stroke-width="1.2"/>
  <text x="84" y="544" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#666666">input</text>
  <text x="1010" y="544" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#666666">output</text>
  <!-- bars: low, low, peak (red) mid-front, low ... -->
  <rect x="150" y="566" width="40" height="14" rx="3" fill="#cfd6dd"/>
  <rect x="210" y="560" width="40" height="20" rx="3" fill="#cfd6dd"/>
  <rect x="270" y="548" width="40" height="32" rx="3" fill="#C44E52"/>
  <rect x="330" y="554" width="40" height="26" rx="3" fill="#e0a6a4"/>
  <rect x="390" y="566" width="40" height="14" rx="3" fill="#cfd6dd"/>
  <rect x="450" y="568" width="40" height="12" rx="3" fill="#cfd6dd"/>
  <rect x="510" y="569" width="40" height="11" rx="3" fill="#cfd6dd"/>
  <rect x="570" y="570" width="40" height="10" rx="3" fill="#cfd6dd"/>
  <rect x="630" y="569" width="40" height="11" rx="3" fill="#cfd6dd"/>
  <rect x="690" y="568" width="40" height="12" rx="3" fill="#cfd6dd"/>
  <rect x="750" y="567" width="40" height="13" rx="3" fill="#cfd6dd"/>
  <rect x="810" y="566" width="40" height="14" rx="3" fill="#cfd6dd"/>
  <rect x="870" y="565" width="40" height="15" rx="3" fill="#cfd6dd"/>
  <rect x="930" y="564" width="40" height="16" rx="3" fill="#cfd6dd"/>
  <text x="290" y="540" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#C44E52">causal peak (mid-front)</text>
</svg>
