<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 2x2 grid of the four theories' CAUSAL (mechanism) results -->

  <!-- Scaling (blue) top-left -->
  <rect x="64" y="180" width="564" height="232" rx="12" fill="#FFFFFF" stroke="#D8DEE4" stroke-width="1.3"/>
  <rect x="64" y="180" width="564" height="8" rx="4" fill="#0072B2"/>
  <text x="88" y="222" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="#0072B2">Urban Scaling</text>
  <text x="88" y="252" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#666666">nudge population &#8594; does GDP output move?</text>
  <text x="88" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#1A1A1A">text +0.24,  VL ~1/7</text>
  <text x="88" y="338" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#1A1A1A">the text model reasons in its mid-front layers;</text>
  <text x="88" y="358" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#1A1A1A">the vision-language model barely reasons there</text>
  <rect x="88" y="372" width="220" height="26" rx="13" fill="#EAF3F8"/>
  <text x="198" y="390" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#0072B2">used in text, weak in VL</text>

  <!-- Distance Decay (orange) top-right -->
  <rect x="652" y="180" width="564" height="232" rx="12" fill="#FFFFFF" stroke="#D8DEE4" stroke-width="1.3"/>
  <rect x="652" y="180" width="564" height="8" rx="4" fill="#D55E00"/>
  <text x="676" y="222" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="#D55E00">Distance Decay</text>
  <text x="676" y="252" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#666666">nudge population &#8594; does density move?</text>
  <text x="676" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#1A1A1A">text +0.025,  VL flat</text>
  <text x="676" y="338" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#1A1A1A">text shows a real effect (above the chance band);</text>
  <text x="676" y="358" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#1A1A1A">VL sits in the noise &#8212; same split as Scaling</text>
  <rect x="676" y="372" width="220" height="26" rx="13" fill="#FFF4E8"/>
  <text x="786" y="390" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#D55E00">used in text, weak in VL</text>

  <!-- Urban Vitality (green) bottom-left -->
  <rect x="64" y="432" width="564" height="232" rx="12" fill="#FFFFFF" stroke="#D8DEE4" stroke-width="1.3"/>
  <rect x="64" y="432" width="564" height="8" rx="4" fill="#009E73"/>
  <text x="88" y="474" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="#009E73">Urban Vitality</text>
  <text x="88" y="504" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#666666">nudge building mix &#8594; does livability move?</text>
  <text x="88" y="552" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#1A1A1A">near zero (+0.002)</text>
  <text x="88" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#1A1A1A">direction is right (11 of 12 correct sign) but the</text>
  <text x="88" y="610" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#1A1A1A">effect is tiny &#8212; encoded, not computed with</text>
  <rect x="88" y="624" width="180" height="26" rx="13" fill="#E3F4EE"/>
  <text x="178" y="642" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#009E73">barely used</text>

  <!-- Urban Perception (red) bottom-right -->
  <rect x="652" y="432" width="564" height="232" rx="12" fill="#FFFFFF" stroke="#D8DEE4" stroke-width="1.3"/>
  <rect x="652" y="432" width="564" height="8" rx="4" fill="#C44E52"/>
  <text x="676" y="474" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="#C44E52">Urban Perception</text>
  <text x="676" y="504" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#666666">edit the image &#8594; does the perception score move?</text>
  <text x="676" y="552" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#1A1A1A">r = 0.92 vs GPT-4o</text>
  <text x="676" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#1A1A1A">the open model's behavioural effects track the</text>
  <text x="676" y="610" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#1A1A1A">closed GPT-4o closely &#8212; the bridge holds</text>
  <rect x="676" y="624" width="232" height="26" rx="13" fill="#FBEAE8"/>
  <text x="792" y="642" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#C44E52">behavioural match, open&#8594;closed</text>
</svg>
